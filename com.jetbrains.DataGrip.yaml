app-id: com.jetbrains.DataGrip
command: datagrip
finish-args:
  - --allow=devel
  - --device=all
  - --env=DATAGRIP_PROPERTIES=/app/bin/idea.override.properties
  - --filesystem=host
  - --filesystem=xdg-run/gnupg
  - --filesystem=xdg-run/keyring
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=gpg-agent
  - --socket=ssh-auth
  - --socket=wayland
  - --talk-name=org.freedesktop.FileManager1
  - --talk-name=org.freedesktop.Flatpak
  - --talk-name=org.freedesktop.secrets
modules:
  - name: jetbrains-flatpak-wrapper
    buildsystem: meson
    config-opts:
      - -Deditor_binary=/app/bin/datagrip
      - -Deditor_title=DataGrip
      - -Dprogram_name=datagrip
    sources:
      - type: git
        commit: d581fd9b873acbf6fb22899aa388435f6c00f61a
        url: https://github.com/flathub-infra/ide-flatpak-wrapper.git

  - name: datagrip
    build-commands:
      - bsdtar -C /app -f datagrip.tar.gz -x -z --strip-components=1
      - install -D -m 644 -t /app/share/applications/ ${FLATPAK_ID}.desktop
      - install -D -m 644 -t /app/share/metainfo/ ${FLATPAK_ID}.metainfo.xml
      - install -D -m 644 /app/bin/datagrip.svg /app/share/icons/hicolor/scalable/apps/${FLATPAK_ID}.svg
      - install -D -m 644 idea.properties /app/bin/idea.override.properties
    buildsystem: simple
    sources:
      - type: file
        dest-filename: datagrip.tar.gz
        only-arches:
          - aarch64
        sha256: 56b15dcc4a8c5a4de82e4b8419d8f3d7d14d96303df067495cc239c9a989476a
        url: https://download.jetbrains.com/datagrip/datagrip-2026.2-aarch64.tar.gz
        x-checker-data:
          code: DG
          is-main-source: true
          type: jetbrains
      - type: file
        dest-filename: datagrip.tar.gz
        only-arches:
          - x86_64
        sha256: 9d68d1b6435cb9850c63b6f98a704346abc07a84826c30ab2fcbb3da4516c46f
        url: https://download.jetbrains.com/datagrip/datagrip-2026.2.tar.gz
        x-checker-data:
          code: DG
          is-main-source: true
          type: jetbrains
      - type: file
        path: com.jetbrains.DataGrip.desktop
      - type: file
        path: com.jetbrains.DataGrip.metainfo.xml
      - type: file
        path: idea.properties
runtime: org.freedesktop.Sdk
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
separate-locales: false
tags:
  - proprietary
